version: 2
updates:
  # Frontend / Next.js (pnpm-Workspace v02)
  - package-ecosystem: "npm"
    directory: "/v02"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(deps)"

  # Intelligence-Pipeline (Python)
  - package-ecosystem: "pip"
    directory: "/v02/intelligence"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      pip-minor-patch:
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"
