name: deploy-source

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-source-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Guard main branch
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          echo "::error::deploy-source must be run from main. Selected ref: ${GITHUB_REF_NAME:-$GITHUB_REF}"
          exit 1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify source
        run: bash scripts/verify.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: v02/pnpm-lock.yaml

      - name: Verify app build
        working-directory: v02
        run: |
          pnpm install --frozen-lockfile
          pnpm run verify

      - name: Validate deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          test -n "$VPS_APP_DIR"

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy source to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes "$VPS_USER@$VPS_HOST" \
            "REPO_URL='$REPO_URL' TARGET_DIR='$VPS_APP_DIR' EXPECTED_SHA='$EXPECTED_SHA' bash -s" \
            < scripts/deploy-source.sh
