name: verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Source gate
        run: bash scripts/verify.sh

  app-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v02
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: v02/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify app
        run: pnpm run verify

  intelligence-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v02/intelligence
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: v02/intelligence/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline tests
        run: python -m pytest tests/ -q
